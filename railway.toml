# Railway frontend service configuration
# Deploy: railway up --service=flipiq-frontend

[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile.frontend"
rootDirectory = "frontend"

[deploy]
restartPolicyType = "on_failure"

[variables]
NODE_ENV = "production"
VITE_API_URL = "https://flipiq-backend-production-7d65.up.railway.app"
